<svg xmlns="http://www.w3.org/2000/svg" width="850" height="120" viewBox="0 0 850 120">
  <defs>
    <!-- Neon gradient line -->
    <linearGradient id="neonLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff2d95" stop-opacity="0"/>
      <stop offset="15%" stop-color="#ff2d95"/>
      <stop offset="40%" stop-color="#00f0ff"/>
      <stop offset="60%" stop-color="#39ff14"/>
      <stop offset="85%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#ff2d95" stop-opacity="0"/>
    </linearGradient>

    <!-- Scanline pattern -->
    <pattern id="scanlines" patternUnits="userSpaceOnUse" width="850" height="4">
      <rect width="850" height="2" fill="rgba(255,255,255,0.03)"/>
      <rect y="2" width="850" height="2" fill="transparent"/>
    </pattern>

    <!-- City skyline clip -->
    <clipPath id="cityClip">
      <rect width="850" height="120"/>
    </clipPath>

    <!-- Vignette gradients -->
    <linearGradient id="vigL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#0a0a0f" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="vigR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0a0a0f" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
  </defs>

  <style>
    @keyframes scanMove {
      0% { transform: translateY(-120px); }
      100% { transform: translateY(120px); }
    }
    @keyframes flicker1 {
      0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
      20%, 24%, 55% { opacity: 0.4; }
    }
    @keyframes flicker2 {
      0%, 40%, 43%, 60%, 62%, 100% { opacity: 0.9; }
      41%, 42%, 61% { opacity: 0.3; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    @keyframes glitchBar {
      0%, 90%, 100% { opacity: 0; }
      92% { opacity: 0.8; transform: translateX(-3px); }
      94% { opacity: 0; }
      96% { opacity: 0.6; transform: translateX(5px); }
      98% { opacity: 0; }
    }
    @keyframes signalPulse {
      0% { transform: translateX(-850px); }
      100% { transform: translateX(850px); }
    }
    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    @keyframes dataStream {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.8; }
    }
    .scan-beam { animation: scanMove 4s linear infinite; }
    .neon-flicker-1 { animation: flicker1 3s infinite; }
    .neon-flicker-2 { animation: flicker2 4s infinite; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; }
    .glitch-bar { animation: glitchBar 5s infinite; }
    .signal-pulse { animation: signalPulse 6s linear infinite; }
    .cursor-blink { animation: blink 1s step-end infinite; }
    .data-stream { animation: dataStream 3s ease-in-out infinite; }
    .mono { font-family: 'Courier New', Courier, monospace; }
  </style>

  <!-- Background -->
  <rect width="850" height="120" fill="#0a0a0f"/>

  <!-- Subtle grid lines -->
  <g opacity="0.05">
    <line x1="0" y1="30" x2="850" y2="30" stroke="#00f0ff" stroke-width="0.5"/>
    <line x1="0" y1="60" x2="850" y2="60" stroke="#00f0ff" stroke-width="0.5"/>
    <line x1="0" y1="90" x2="850" y2="90" stroke="#00f0ff" stroke-width="0.5"/>
    <line x1="212" y1="0" x2="212" y2="120" stroke="#00f0ff" stroke-width="0.5"/>
    <line x1="425" y1="0" x2="425" y2="120" stroke="#00f0ff" stroke-width="0.5"/>
    <line x1="637" y1="0" x2="637" y2="120" stroke="#00f0ff" stroke-width="0.5"/>
  </g>

  <!-- City skyline silhouette at bottom -->
  <g opacity="0.15">
    <polygon points="0,120 0,105 15,105 15,95 25,95 25,100 35,100 35,85 45,85 45,90 55,90 55,80 60,80 60,75 70,75 70,85 80,85 80,70 90,70 90,78 95,78 95,65 105,65 105,72 110,72 110,60 120,60 120,68 130,68 130,55 140,55 140,65 145,65 145,75 155,75 155,85 165,85 165,90 175,90 175,95 185,95 185,88 195,88 195,78 205,78 205,82 210,82 210,70 220,70 220,62 225,62 225,55 230,55 230,62 240,62 240,72 250,72 250,85 260,85 260,92 270,92 270,98 280,98 280,90 290,90 290,82 295,82 295,72 305,72 305,80 315,80 315,88 325,88 325,95 335,95 335,100 345,100 345,92 355,92 355,82 360,82 360,70 365,70 365,60 375,60 375,55 380,55 380,48 385,48 385,55 395,55 395,65 400,65 400,75 410,75 410,85 420,85 420,90 430,90 430,95 440,95 440,88 450,88 450,78 455,78 455,68 460,68 460,58 470,58 470,65 475,65 475,72 485,72 485,82 495,82 495,90 505,90 505,95 515,95 515,100 525,100 525,92 535,92 535,85 540,85 540,75 545,75 545,65 550,65 550,58 560,58 560,52 565,52 565,45 570,45 570,52 580,52 580,62 585,62 585,72 595,72 595,80 605,80 605,88 615,88 615,95 625,95 625,100 635,100 635,92 645,92 645,82 650,82 650,72 660,72 660,78 665,78 665,85 675,85 675,90 685,90 685,95 695,95 695,88 705,88 705,78 710,78 710,68 715,68 715,58 720,58 720,50 725,50 725,58 735,58 735,68 745,68 745,75 755,75 755,82 765,82 765,90 775,90 775,95 785,95 785,100 800,100 800,92 810,92 810,85 820,85 820,90 830,90 830,95 840,95 840,105 850,105 850,120" fill="#0a0a0f" stroke="#00f0ff" stroke-width="0.5"/>
  </g>
  <!-- Building window lights -->
  <g class="data-stream">
    <rect x="112" y="63" width="2" height="2" fill="#ff2d95" opacity="0.5"/>
    <rect x="116" y="66" width="2" height="2" fill="#00f0ff" opacity="0.4"/>
    <rect x="132" y="58" width="2" height="2" fill="#39ff14" opacity="0.5"/>
    <rect x="136" y="62" width="2" height="2" fill="#ff2d95" opacity="0.3"/>
    <rect x="222" y="65" width="2" height="2" fill="#00f0ff" opacity="0.5"/>
    <rect x="227" y="58" width="2" height="2" fill="#ff2d95" opacity="0.4"/>
    <rect x="362" y="63" width="2" height="2" fill="#39ff14" opacity="0.5"/>
    <rect x="367" y="72" width="2" height="2" fill="#00f0ff" opacity="0.3"/>
    <rect x="382" y="52" width="2" height="2" fill="#ff2d95" opacity="0.5"/>
    <rect x="462" y="62" width="2" height="2" fill="#00f0ff" opacity="0.4"/>
    <rect x="552" y="55" width="2" height="2" fill="#ff2d95" opacity="0.5"/>
    <rect x="567" y="48" width="2" height="2" fill="#39ff14" opacity="0.5"/>
    <rect x="717" y="55" width="2" height="2" fill="#00f0ff" opacity="0.4"/>
    <rect x="722" y="62" width="2" height="2" fill="#ff2d95" opacity="0.3"/>
  </g>

  <!-- Neon divider line at top - multi-layer glow simulation -->
  <rect x="29" y="7" width="792" height="4" fill="url(#neonLine)" opacity="0.1" rx="2" class="neon-flicker-1"/>
  <rect x="30" y="8" width="790" height="2" fill="url(#neonLine)" opacity="0.6" class="neon-flicker-1"/>
  <rect x="31" y="8.5" width="788" height="1" fill="white" opacity="0.2" class="neon-flicker-1"/>

  <!-- Corner decorations -->
  <g stroke="#ff2d95" stroke-width="1.5" opacity="0.7" class="neon-flicker-2">
    <polyline points="5,5 5,20" fill="none"/>
    <polyline points="5,5 20,5" fill="none"/>
    <polyline points="845,5 845,20" fill="none"/>
    <polyline points="845,5 830,5" fill="none"/>
    <polyline points="5,115 5,100" fill="none"/>
    <polyline points="5,115 20,115" fill="none"/>
    <polyline points="845,115 845,100" fill="none"/>
    <polyline points="845,115 830,115" fill="none"/>
  </g>

  <!-- Signal pulse sweep -->
  <rect class="signal-pulse" x="0" y="0" width="80" height="120" fill="url(#neonLine)" opacity="0.04"/>

  <!-- Main title text - multi-layer glow simulation -->
  <text x="425" y="43" text-anchor="middle" class="mono" fill="#ff2d95" font-size="16" font-weight="bold" letter-spacing="3" opacity="0.2">
    &#x300C; HACK THE PLANET // DEBUG THE MATRIX &#x300D;
  </text>
  <text x="425" y="41" text-anchor="middle" class="mono" fill="#ff2d95" font-size="16" font-weight="bold" letter-spacing="3" opacity="0.2">
    &#x300C; HACK THE PLANET // DEBUG THE MATRIX &#x300D;
  </text>
  <text x="425" y="42" text-anchor="middle" class="mono neon-flicker-1" fill="#ff2d95" font-size="16" font-weight="bold" letter-spacing="3">
    &#x300C; HACK THE PLANET // DEBUG THE MATRIX &#x300D;
  </text>

  <!-- Decorative hex data streams on sides -->
  <text x="42" y="42" class="mono data-stream" fill="#00f0ff" font-size="8" opacity="0.3">0xF0CA</text>
  <text x="780" y="42" class="mono data-stream" fill="#00f0ff" font-size="8" opacity="0.3">0xDEAD</text>

  <!-- Neon divider line middle -->
  <line x1="120" y1="54" x2="730" y2="54" stroke="#00f0ff" stroke-width="0.5" opacity="0.3" stroke-dasharray="3,6"/>

  <!-- Status line - multi-layer glow simulation -->
  <text x="425" y="73" text-anchor="middle" class="mono" fill="#39ff14" font-size="10.5" letter-spacing="1.5" opacity="0.2">
    CONNECTION_STATUS: ONLINE | UPTIME: &#x221E; | BUGS_SQUASHED: 999+
  </text>
  <text x="425" y="71" text-anchor="middle" class="mono" fill="#39ff14" font-size="10.5" letter-spacing="1.5" opacity="0.2">
    CONNECTION_STATUS: ONLINE | UPTIME: &#x221E; | BUGS_SQUASHED: 999+
  </text>
  <text x="425" y="72" text-anchor="middle" class="mono pulse-anim" fill="#39ff14" font-size="10.5" letter-spacing="1.5">
    CONNECTION_STATUS: ONLINE | UPTIME: &#x221E; | BUGS_SQUASHED: 999+
  </text>

  <!-- Blinking cursor -->
  <rect x="658" y="63" width="7" height="12" fill="#39ff14" opacity="0.8" class="cursor-blink"/>

  <!-- Bottom decorative elements -->
  <g class="mono" fill="#00f0ff" font-size="7" opacity="0.35">
    <text x="42" y="98">SYS.INIT</text>
    <text x="42" y="108">&#x25B6; READY</text>
  </g>
  <g class="mono" fill="#ff2d95" font-size="7" opacity="0.35">
    <text x="760" y="98" text-anchor="end">MEM: 64TB</text>
    <text x="760" y="108" text-anchor="end">CPU: &#x2588;&#x2588;&#x2588;&#x2588;&#x2591; 82%</text>
  </g>

  <!-- Center bottom marker - multi-layer glow -->
  <text x="425" y="101" text-anchor="middle" class="mono" fill="#00f0ff" font-size="7" opacity="0.15">
    &#x25C0; SECTOR-7G :: NEURAL_LINK_ACTIVE &#x25B6;
  </text>
  <text x="425" y="100" text-anchor="middle" class="mono neon-flicker-2" fill="#00f0ff" font-size="7" opacity="0.5">
    &#x25C0; SECTOR-7G :: NEURAL_LINK_ACTIVE &#x25B6;
  </text>

  <!-- Bottom neon line - multi-layer glow simulation -->
  <rect x="29" y="109" width="792" height="3.5" fill="url(#neonLine)" opacity="0.1" rx="2" class="neon-flicker-2"/>
  <rect x="30" y="110" width="790" height="1.5" fill="url(#neonLine)" opacity="0.6" class="neon-flicker-2"/>
  <rect x="31" y="110.5" width="788" height="0.5" fill="white" opacity="0.15" class="neon-flicker-2"/>

  <!-- Scanlines overlay -->
  <rect width="850" height="120" fill="url(#scanlines)"/>

  <!-- Moving scan beam -->
  <rect class="scan-beam" x="0" y="0" width="850" height="3" fill="#00f0ff" opacity="0.06"/>

  <!-- Glitch bars -->
  <g class="glitch-bar">
    <rect x="0" y="25" width="850" height="2" fill="#ff2d95" opacity="0.3"/>
    <rect x="100" y="67" width="400" height="1" fill="#00f0ff" opacity="0.4"/>
  </g>

  <!-- Vignette edges -->
  <rect width="60" height="120" fill="url(#vigL)" opacity="0.5"/>
  <rect x="790" width="60" height="120" fill="url(#vigR)" opacity="0.5"/>
</svg>