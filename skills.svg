<svg xmlns="http://www.w3.org/2000/svg" width="850" height="200" viewBox="0 0 850 200">
  <defs>
    <style>
      @keyframes breathe {
        0%, 100% { opacity: 0.6; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.08); }
      }
      @keyframes glowPulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.7; }
      }
      @keyframes shimmer {
        0%, 100% { opacity: 0.15; }
        50% { opacity: 0.45; }
      }
      @keyframes floatUp {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-3px); }
      }
      @keyframes coreGlow {
        0%, 100% { r: 8; opacity: 0.9; }
        50% { r: 12; opacity: 1; }
      }
      @keyframes dustFloat {
        0% { opacity: 0; transform: translateY(0); }
        30% { opacity: 0.6; }
        100% { opacity: 0; transform: translateY(-20px); }
      }
      @keyframes borderGlow {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.6; }
      }
      .stone { animation: floatUp 3s ease-in-out infinite; }
      .stone:nth-child(2) { animation-delay: 0.3s; }
      .stone:nth-child(3) { animation-delay: 0.6s; }
      .stone:nth-child(4) { animation-delay: 0.9s; }
      .stone:nth-child(5) { animation-delay: 1.2s; }
      .stone:nth-child(6) { animation-delay: 1.5s; }
      .stone:nth-child(7) { animation-delay: 1.8s; }
      .halo { animation: glowPulse 3s ease-in-out infinite; }
      .core { animation: coreGlow 2.5s ease-in-out infinite; }
      .dust { animation: dustFloat 4s ease-out infinite; }
      .skill-label {
        font-family: 'Georgia', 'Times New Roman', serif;
        font-size: 11px;
        font-weight: bold;
        letter-spacing: 1px;
      }
      .title-text {
        font-family: 'Georgia', 'Times New Roman', serif;
        font-size: 15px;
        font-weight: bold;
        letter-spacing: 4px;
      }
      .shelf-glow { animation: borderGlow 4s ease-in-out infinite; }
      .shimmer-line { animation: shimmer 3.5s ease-in-out infinite; }
    </style>

    <!-- 灵石形状: 八边形宝石 -->
    <polygon id="gem" points="0,-22 15,-15 22,0 15,15 0,22 -15,15 -22,0 -15,-15"/>

    <!-- 外层光晕滤镜 -->
    <filter id="glow-gold" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#FFD700" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-blue" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#4A9EFF" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-red" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#FF6B4A" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-yellow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#FCC624" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-purple" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#A855F7" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-cyan" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#38BDF8" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-teal" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#2DD4BF" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- 背景纹理 -->
    <pattern id="bgPattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="none"/>
      <circle cx="20" cy="20" r="0.5" fill="#ffffff" opacity="0.05"/>
    </pattern>

    <!-- 木架渐变 -->
    <linearGradient id="shelfWood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2518"/>
      <stop offset="50%" stop-color="#2a1a10"/>
      <stop offset="100%" stop-color="#1a0f08"/>
    </linearGradient>
    <linearGradient id="shelfEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6b4226"/>
      <stop offset="50%" stop-color="#4a2c17"/>
      <stop offset="100%" stop-color="#2a1a10"/>
    </linearGradient>
    <linearGradient id="pillarGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2a1a10"/>
      <stop offset="30%" stop-color="#4a2c17"/>
      <stop offset="70%" stop-color="#4a2c17"/>
      <stop offset="100%" stop-color="#2a1a10"/>
    </linearGradient>
  </defs>

  <!-- ========== 背景 ========== -->
  <rect width="850" height="200" fill="#0d1117" rx="8"/>
  <rect width="850" height="200" fill="url(#bgPattern)" rx="8"/>

  <!-- 背景星尘 -->
  <circle cx="80" cy="30" r="1" fill="#fff" opacity="0.15"><animate attributeName="opacity" values="0.05;0.25;0.05" dur="5s" repeatCount="indefinite"/></circle>
  <circle cx="200" cy="18" r="0.8" fill="#fff" opacity="0.1"><animate attributeName="opacity" values="0.05;0.2;0.05" dur="7s" repeatCount="indefinite"/></circle>
  <circle cx="350" cy="25" r="1.2" fill="#fff" opacity="0.12"><animate attributeName="opacity" values="0.05;0.3;0.05" dur="4s" repeatCount="indefinite"/></circle>
  <circle cx="520" cy="15" r="0.7" fill="#fff" opacity="0.1"><animate attributeName="opacity" values="0.08;0.22;0.08" dur="6s" repeatCount="indefinite"/></circle>
  <circle cx="680" cy="22" r="1" fill="#fff" opacity="0.13"><animate attributeName="opacity" values="0.05;0.25;0.05" dur="5.5s" repeatCount="indefinite"/></circle>
  <circle cx="770" cy="35" r="0.9" fill="#fff" opacity="0.1"><animate attributeName="opacity" values="0.05;0.2;0.05" dur="8s" repeatCount="indefinite"/></circle>
  <circle cx="130" cy="170" r="0.6" fill="#fff" opacity="0.08"><animate attributeName="opacity" values="0.03;0.18;0.03" dur="6s" repeatCount="indefinite"/></circle>
  <circle cx="440" cy="180" r="0.8" fill="#fff" opacity="0.1"><animate attributeName="opacity" values="0.05;0.2;0.05" dur="7s" repeatCount="indefinite"/></circle>
  <circle cx="720" cy="175" r="1" fill="#fff" opacity="0.08"><animate attributeName="opacity" values="0.04;0.16;0.04" dur="5s" repeatCount="indefinite"/></circle>

  <!-- ========== 百宝阁外框 ========== -->
  <!-- 外框装饰边 -->
  <rect x="25" y="8" width="800" height="184" rx="5" fill="none" stroke="#4a2c17" stroke-width="2" opacity="0.6"/>
  <rect x="27" y="10" width="796" height="180" rx="4" fill="none" stroke="#6b4226" stroke-width="0.5" opacity="0.3"/>

  <!-- 四角装饰 -->
  <path d="M25,25 L25,8 L42,8" fill="none" stroke="#c8956c" stroke-width="1.5" opacity="0.6"/>
  <path d="M825,25 L825,8 L808,8" fill="none" stroke="#c8956c" stroke-width="1.5" opacity="0.6"/>
  <path d="M25,175 L25,192 L42,192" fill="none" stroke="#c8956c" stroke-width="1.5" opacity="0.6"/>
  <path d="M825,175 L825,192 L808,192" fill="none" stroke="#c8956c" stroke-width="1.5" opacity="0.6"/>
  <!-- 角点宝珠 -->
  <circle cx="25" cy="8" r="2" fill="#c8956c" opacity="0.5"/>
  <circle cx="825" cy="8" r="2" fill="#c8956c" opacity="0.5"/>
  <circle cx="25" cy="192" r="2" fill="#c8956c" opacity="0.5"/>
  <circle cx="825" cy="192" r="2" fill="#c8956c" opacity="0.5"/>

  <!-- 顶部横梁 -->
  <rect x="40" y="14" width="770" height="6" rx="2" fill="url(#shelfEdge)" opacity="0.7"/>
  <line x1="40" y1="20" x2="810" y2="20" stroke="#6b4226" stroke-width="0.5" opacity="0.4"/>

  <!-- ========== 标题区域 ========== -->
  <text x="425" y="40" text-anchor="middle" class="title-text" fill="#c8956c" opacity="0.85">
    &#x7075;&#x5668;&#x767E;&#x5B9D;&#x9601;
  </text>
  <!-- 标题两侧装饰线 -->
  <line x1="290" y1="37" x2="340" y2="37" stroke="#c8956c" stroke-width="0.8" opacity="0.4" class="shimmer-line"/>
  <line x1="510" y1="37" x2="560" y2="37" stroke="#c8956c" stroke-width="0.8" opacity="0.4" class="shimmer-line"/>
  <circle cx="288" cy="37" r="1.5" fill="#c8956c" opacity="0.4"/>
  <circle cx="562" cy="37" r="1.5" fill="#c8956c" opacity="0.4"/>

  <!-- ========== 搁板 ========== -->
  <!-- 上层搁板 -->
  <rect x="50" y="52" width="750" height="3" rx="1" fill="url(#shelfEdge)" opacity="0.5"/>
  <line x1="50" y1="55" x2="800" y2="55" stroke="#1a0f08" stroke-width="0.5" opacity="0.6"/>
  <!-- 下层搁板 -->
  <rect x="50" y="145" width="750" height="3" rx="1" fill="url(#shelfEdge)" opacity="0.5"/>
  <line x1="50" y1="145" x2="800" y2="145" stroke="#6b4226" stroke-width="0.5" opacity="0.3"/>

  <!-- 竖向隔板（将7个技能分隔）-->
  <line x1="50" y1="55" x2="50" y2="145" stroke="#4a2c17" stroke-width="1" opacity="0.3"/>
  <line x1="800" y1="55" x2="800" y2="145" stroke="#4a2c17" stroke-width="1" opacity="0.3"/>

  <!-- ========== 灵石技能展示 ========== -->

  <!-- === Python 灵石 (金色) === -->
  <g class="stone" style="animation-delay: 0s">
    <g transform="translate(107, 95)">
      <!-- 底座光圈 -->
      <ellipse cx="0" cy="24" rx="18" ry="4" fill="#FFD700" opacity="0.08" class="halo"/>
      <!-- 外层光晕 -->
      <circle cx="0" cy="0" r="30" fill="#FFD700" opacity="0.04" class="halo" style="animation-delay: 0.2s"/>
      <circle cx="0" cy="0" r="22" fill="#FFD700" opacity="0.06" class="halo" style="animation-delay: 0.5s"/>
      <!-- 灵石主体 -->
      <use href="#gem" fill="#1a1400" stroke="#FFD700" stroke-width="1.5" filter="url(#glow-gold)" opacity="0.9"/>
      <use href="#gem" fill="none" stroke="#FFD700" stroke-width="0.5" opacity="0.3" transform="scale(0.7)"/>
      <!-- 内核 -->
      <circle cx="0" cy="0" r="6" fill="#FFD700" opacity="0.25" class="core"/>
      <circle cx="0" cy="0" r="3" fill="#FFD700" opacity="0.5"/>
      <!-- 灵气粒子 -->
      <circle cx="-8" cy="-12" r="1" fill="#FFD700" opacity="0.4" class="dust" style="animation-delay: 0s"/>
      <circle cx="10" cy="-8" r="0.8" fill="#FFD700" opacity="0.3" class="dust" style="animation-delay: 1.5s"/>
      <circle cx="5" cy="10" r="0.6" fill="#FFD700" opacity="0.35" class="dust" style="animation-delay: 3s"/>
    </g>
    <text x="107" y="133" text-anchor="middle" class="skill-label" fill="#FFD700" opacity="0.8">Python</text>
  </g>

  <!-- === C++ 灵石 (蓝色) === -->
  <g class="stone" style="animation-delay: 0.4s">
    <g transform="translate(214, 95)">
      <ellipse cx="0" cy="24" rx="18" ry="4" fill="#4A9EFF" opacity="0.08" class="halo"/>
      <circle cx="0" cy="0" r="30" fill="#4A9EFF" opacity="0.04" class="halo" style="animation-delay: 0.3s"/>
      <circle cx="0" cy="0" r="22" fill="#4A9EFF" opacity="0.06" class="halo" style="animation-delay: 0.6s"/>
      <use href="#gem" fill="#0a0f1a" stroke="#4A9EFF" stroke-width="1.5" filter="url(#glow-blue)" opacity="0.9"/>
      <use href="#gem" fill="none" stroke="#4A9EFF" stroke-width="0.5" opacity="0.3" transform="scale(0.7)"/>
      <circle cx="0" cy="0" r="6" fill="#4A9EFF" opacity="0.25" class="core"/>
      <circle cx="0" cy="0" r="3" fill="#4A9EFF" opacity="0.5"/>
      <circle cx="-6" cy="-14" r="0.9" fill="#4A9EFF" opacity="0.35" class="dust" style="animation-delay: 0.5s"/>
      <circle cx="9" cy="-6" r="0.7" fill="#4A9EFF" opacity="0.3" class="dust" style="animation-delay: 2s"/>
      <circle cx="-4" cy="8" r="0.8" fill="#4A9EFF" opacity="0.3" class="dust" style="animation-delay: 3.2s"/>
    </g>
    <text x="214" y="133" text-anchor="middle" class="skill-label" fill="#4A9EFF" opacity="0.8">C++</text>
  </g>

  <!-- === PyTorch 灵石 (赤色) === -->
  <g class="stone" style="animation-delay: 0.8s">
    <g transform="translate(321, 95)">
      <ellipse cx="0" cy="24" rx="18" ry="4" fill="#FF6B4A" opacity="0.08" class="halo"/>
      <circle cx="0" cy="0" r="30" fill="#FF6B4A" opacity="0.04" class="halo" style="animation-delay: 0.1s"/>
      <circle cx="0" cy="0" r="22" fill="#FF6B4A" opacity="0.06" class="halo" style="animation-delay: 0.4s"/>
      <use href="#gem" fill="#1a0a05" stroke="#FF6B4A" stroke-width="1.5" filter="url(#glow-red)" opacity="0.9"/>
      <use href="#gem" fill="none" stroke="#FF6B4A" stroke-width="0.5" opacity="0.3" transform="scale(0.7)"/>
      <circle cx="0" cy="0" r="6" fill="#FF6B4A" opacity="0.25" class="core"/>
      <circle cx="0" cy="0" r="3" fill="#FF6B4A" opacity="0.5"/>
      <circle cx="7" cy="-13" r="1" fill="#FF6B4A" opacity="0.4" class="dust" style="animation-delay: 0.8s"/>
      <circle cx="-10" cy="-5" r="0.7" fill="#FF6B4A" opacity="0.3" class="dust" style="animation-delay: 2.2s"/>
      <circle cx="3" cy="9" r="0.9" fill="#FF6B4A" opacity="0.35" class="dust" style="animation-delay: 3.5s"/>
    </g>
    <text x="321" y="133" text-anchor="middle" class="skill-label" fill="#FF6B4A" opacity="0.8">PyTorch</text>
  </g>

  <!-- === Linux 灵石 (黄色) === -->
  <g class="stone" style="animation-delay: 1.2s">
    <g transform="translate(428, 95)">
      <ellipse cx="0" cy="24" rx="18" ry="4" fill="#FCC624" opacity="0.08" class="halo"/>
      <circle cx="0" cy="0" r="30" fill="#FCC624" opacity="0.04" class="halo" style="animation-delay: 0.4s"/>
      <circle cx="0" cy="0" r="22" fill="#FCC624" opacity="0.06" class="halo" style="animation-delay: 0.7s"/>
      <use href="#gem" fill="#1a1500" stroke="#FCC624" stroke-width="1.5" filter="url(#glow-yellow)" opacity="0.9"/>
      <use href="#gem" fill="none" stroke="#FCC624" stroke-width="0.5" opacity="0.3" transform="scale(0.7)"/>
      <circle cx="0" cy="0" r="6" fill="#FCC624" opacity="0.25" class="core"/>
      <circle cx="0" cy="0" r="3" fill="#FCC624" opacity="0.5"/>
      <circle cx="-9" cy="-11" r="0.8" fill="#FCC624" opacity="0.35" class="dust" style="animation-delay: 1s"/>
      <circle cx="8" cy="-9" r="1" fill="#FCC624" opacity="0.3" class="dust" style="animation-delay: 2.5s"/>
      <circle cx="-5" cy="7" r="0.7" fill="#FCC624" opacity="0.3" class="dust" style="animation-delay: 3.8s"/>
    </g>
    <text x="428" y="133" text-anchor="middle" class="skill-label" fill="#FCC624" opacity="0.8">Linux</text>
  </g>

  <!-- === OpenCV 灵石 (紫色) === -->
  <g class="stone" style="animation-delay: 1.6s">
    <g transform="translate(535, 95)">
      <ellipse cx="0" cy="24" rx="18" ry="4" fill="#A855F7" opacity="0.08" class="halo"/>
      <circle cx="0" cy="0" r="30" fill="#A855F7" opacity="0.04" class="halo" style="animation-delay: 0.2s"/>
      <circle cx="0" cy="0" r="22" fill="#A855F7" opacity="0.06" class="halo" style="animation-delay: 0.5s"/>
      <use href="#gem" fill="#0f0a1a" stroke="#A855F7" stroke-width="1.5" filter="url(#glow-purple)" opacity="0.9"/>
      <use href="#gem" fill="none" stroke="#A855F7" stroke-width="0.5" opacity="0.3" transform="scale(0.7)"/>
      <circle cx="0" cy="0" r="6" fill="#A855F7" opacity="0.25" class="core"/>
      <circle cx="0" cy="0" r="3" fill="#A855F7" opacity="0.5"/>
      <circle cx="6" cy="-14" r="0.9" fill="#A855F7" opacity="0.4" class="dust" style="animation-delay: 0.3s"/>
      <circle cx="-11" cy="-4" r="0.6" fill="#A855F7" opacity="0.3" class="dust" style="animation-delay: 1.8s"/>
      <circle cx="4" cy="11" r="0.8" fill="#A855F7" opacity="0.35" class="dust" style="animation-delay: 3.3s"/>
    </g>
    <text x="535" y="133" text-anchor="middle" class="skill-label" fill="#A855F7" opacity="0.8">OpenCV</text>
  </g>

  <!-- === TypeScript 灵石 (天蓝) === -->
  <g class="stone" style="animation-delay: 2s">
    <g transform="translate(642, 95)">
      <ellipse cx="0" cy="24" rx="18" ry="4" fill="#38BDF8" opacity="0.08" class="halo"/>
      <circle cx="0" cy="0" r="30" fill="#38BDF8" opacity="0.04" class="halo" style="animation-delay: 0.3s"/>
      <circle cx="0" cy="0" r="22" fill="#38BDF8" opacity="0.06" class="halo" style="animation-delay: 0.6s"/>
      <use href="#gem" fill="#051520" stroke="#38BDF8" stroke-width="1.5" filter="url(#glow-cyan)" opacity="0.9"/>
      <use href="#gem" fill="none" stroke="#38BDF8" stroke-width="0.5" opacity="0.3" transform="scale(0.7)"/>
      <circle cx="0" cy="0" r="6" fill="#38BDF8" opacity="0.25" class="core"/>
      <circle cx="0" cy="0" r="3" fill="#38BDF8" opacity="0.5"/>
      <circle cx="-7" cy="-12" r="1" fill="#38BDF8" opacity="0.35" class="dust" style="animation-delay: 0.6s"/>
      <circle cx="10" cy="-7" r="0.7" fill="#38BDF8" opacity="0.3" class="dust" style="animation-delay: 2.1s"/>
      <circle cx="-3" cy="10" r="0.8" fill="#38BDF8" opacity="0.3" class="dust" style="animation-delay: 3.6s"/>
    </g>
    <text x="642" y="133" text-anchor="middle" class="skill-label" fill="#38BDF8" opacity="0.8">TypeScript</text>
  </g>

  <!-- === Docker 灵石 (青碧) === -->
  <g class="stone" style="animation-delay: 2.4s">
    <g transform="translate(749, 95)">
      <ellipse cx="0" cy="24" rx="18" ry="4" fill="#2DD4BF" opacity="0.08" class="halo"/>
      <circle cx="0" cy="0" r="30" fill="#2DD4BF" opacity="0.04" class="halo" style="animation-delay: 0.1s"/>
      <circle cx="0" cy="0" r="22" fill="#2DD4BF" opacity="0.06" class="halo" style="animation-delay: 0.4s"/>
      <use href="#gem" fill="#051a15" stroke="#2DD4BF" stroke-width="1.5" filter="url(#glow-teal)" opacity="0.9"/>
      <use href="#gem" fill="none" stroke="#2DD4BF" stroke-width="0.5" opacity="0.3" transform="scale(0.7)"/>
      <circle cx="0" cy="0" r="6" fill="#2DD4BF" opacity="0.25" class="core"/>
      <circle cx="0" cy="0" r="3" fill="#2DD4BF" opacity="0.5"/>
      <circle cx="8" cy="-13" r="0.9" fill="#2DD4BF" opacity="0.4" class="dust" style="animation-delay: 0.4s"/>
      <circle cx="-9" cy="-6" r="0.7" fill="#2DD4BF" opacity="0.3" class="dust" style="animation-delay: 1.9s"/>
      <circle cx="5" cy="8" r="0.6" fill="#2DD4BF" opacity="0.35" class="dust" style="animation-delay: 3.4s"/>
    </g>
    <text x="749" y="133" text-anchor="middle" class="skill-label" fill="#2DD4BF" opacity="0.8">Docker</text>
  </g>

  <!-- ========== 底部装饰 ========== -->
  <!-- 底部横梁 -->
  <rect x="40" y="150" width="770" height="4" rx="2" fill="url(#shelfEdge)" opacity="0.5"/>

  <!-- 底部仙气流动线 -->
  <line x1="100" y1="165" x2="750" y2="165" stroke="#c8956c" stroke-width="0.3" opacity="0.15" class="shimmer-line"/>
  <line x1="150" y1="170" x2="700" y2="170" stroke="#c8956c" stroke-width="0.3" opacity="0.1" class="shimmer-line" style="animation-delay: 1s"/>

  <!-- 底部小标注 -->
  <text x="425" y="180" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#6b4226" opacity="0.4" letter-spacing="6">
    &#x4FEE;&#x884C;&#x4E4B;&#x5668; &#xB7; &#x706F;&#x706B;&#x4E0D;&#x706D;
  </text>

