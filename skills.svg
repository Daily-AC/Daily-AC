<svg xmlns="http://www.w3.org/2000/svg" width="850" height="200" viewBox="0 0 850 200">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#0f1a2a" stroke-width="0.5"/>
    </pattern>
    <pattern id="circuit-bg" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="0" cy="0" r="1" fill="#0d1f30"/>
      <circle cx="40" cy="0" r="1" fill="#0d1f30"/>
      <circle cx="0" cy="40" r="1" fill="#0d1f30"/>
      <circle cx="40" cy="40" r="1" fill="#0d1f30"/>
      <circle cx="20" cy="20" r="1" fill="#0d1f30"/>
    </pattern>
  </defs>

  <style>
    @keyframes pulse1 { 0%,100%{opacity:0.7} 50%{opacity:1} }
    @keyframes pulse2 { 0%,100%{opacity:0.6} 50%{opacity:1} }
    @keyframes dash-flow { to { stroke-dashoffset: -40; } }
    @keyframes dash-flow-rev { to { stroke-dashoffset: 40; } }
    @keyframes flicker { 0%,100%{opacity:1} 8%{opacity:0.7} 12%{opacity:1} 40%{opacity:1} 42%{opacity:0.5} 44%{opacity:1} }
    @keyframes bar-fill-1 { 0%{width:0} 100%{width:66px} }
    @keyframes bar-fill-2 { 0%{width:0} 100%{width:52px} }
    @keyframes bar-fill-3 { 0%{width:0} 100%{width:60px} }
    @keyframes bar-fill-4 { 0%{width:0} 100%{width:62px} }
    @keyframes bar-fill-5 { 0%{width:0} 100%{width:50px} }
    @keyframes bar-fill-6 { 0%{width:0} 100%{width:45px} }
    @keyframes bar-fill-7 { 0%{width:0} 100%{width:55px} }
    @keyframes bar-glow { 0%,100%{opacity:0.6} 50%{opacity:1} }
    @keyframes chip-boot { 0%{opacity:0;transform:scale(0.9)} 100%{opacity:1;transform:scale(1)} }
    @keyframes pin-pulse { 0%,100%{stroke-opacity:0.4} 50%{stroke-opacity:1} }
    @keyframes title-blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .bg { fill: #0a0a0f; }
    .grid-overlay { fill: url(#grid); opacity: 0.5; }
    .title { font-family: 'Courier New', 'Consolas', monospace; font-size: 14px; fill: #00f0ff; font-weight: bold; animation: flicker 4s infinite; }
    .title-glow { font-family: 'Courier New', 'Consolas', monospace; font-size: 14px; fill: #00f0ff; opacity: 0.3; }
    .title-cursor { font-family: 'Courier New', monospace; font-size: 14px; fill: #00f0ff; animation: title-blink 1s steps(1) infinite; }
    .chip-label { font-family: 'Courier New', 'Consolas', monospace; font-size: 10px; font-weight: bold; text-anchor: middle; dominant-baseline: central; }
    .circuit { fill: none; stroke-width: 1.2; stroke-dasharray: 8 6; }
    .circuit-flow { animation: dash-flow 2s linear infinite; }
    .circuit-flow-rev { animation: dash-flow-rev 2.5s linear infinite; }
    .chip { animation: chip-boot 0.8s ease-out both; }
    .chip-hex { fill: #0a0a0f; stroke-width: 2; }
    .pin { stroke-width: 1.5; animation: pin-pulse 2s ease-in-out infinite; }
    .energy-bar-bg { fill: #111118; rx: 2; }
    .energy-bar { rx: 2; animation: bar-glow 2s ease-in-out infinite; }
    .ver { font-family: 'Courier New', monospace; font-size: 8px; fill: #1a3040; }
  </style>

  <!-- Background -->
  <rect class="bg" width="850" height="200" rx="4"/>
  <rect class="grid-overlay" width="850" height="200" rx="4"/>

  <!-- Decorative corner brackets -->
  <path d="M 4 20 L 4 4 L 20 4" fill="none" stroke="#00f0ff" stroke-width="1" opacity="0.4"/>
  <path d="M 846 20 L 846 4 L 830 4" fill="none" stroke="#00f0ff" stroke-width="1" opacity="0.4"/>
  <path d="M 4 180 L 4 196 L 20 196" fill="none" stroke="#ff2d95" stroke-width="1" opacity="0.4"/>
  <path d="M 846 180 L 846 196 L 830 196" fill="none" stroke="#ff2d95" stroke-width="1" opacity="0.4"/>

  <!-- Title with simulated glow (offset duplicate) -->
  <text class="title-glow" x="30" y="27">// TECH_STACK.init()</text>
  <text class="title-glow" x="31" y="29">// TECH_STACK.init()</text>
  <text class="title" x="30" y="28">// TECH_STACK.init()</text>
  <text class="title-cursor" x="225" y="28">_</text>
  <text class="ver" x="750" y="28">v3.7.1 // SYS_ONLINE</text>

  <!-- ============ CIRCUIT TRACES ============ -->
  <!-- Main horizontal bus -->
  <line x1="60" y1="90" x2="790" y2="90" class="circuit circuit-flow" stroke="#0d2a3a" style="stroke-dasharray:2 18;"/>

  <!-- Traces connecting chips -->
  <path d="M 130 85 Q 148 60 165 85" class="circuit circuit-flow" stroke="#ff2d95" opacity="0.7"/>
  <path d="M 200 75 L 240 75 Q 252 75 270 85" class="circuit circuit-flow" stroke="#00f0ff" opacity="0.7"/>
  <path d="M 340 75 L 375 75 Q 388 75 400 85" class="circuit circuit-flow-rev" stroke="#39ff14" opacity="0.65"/>
  <path d="M 445 85 Q 463 65 480 85" class="circuit circuit-flow" stroke="#f0e030" opacity="0.65"/>
  <path d="M 550 75 L 585 75" class="circuit circuit-flow" stroke="#ff6a00" opacity="0.7"/>
  <path d="M 655 85 Q 673 65 690 85" class="circuit circuit-flow-rev" stroke="#bf5fff" opacity="0.65"/>
  <path d="M 725 75 L 760 75" class="circuit circuit-flow" stroke="#2d7fff" opacity="0.6"/>

  <!-- Vertical feed lines from top -->
  <line x1="120" y1="38" x2="120" y2="50" class="circuit circuit-flow" stroke="#ff2d95" opacity="0.6"/>
  <line x1="230" y1="38" x2="230" y2="50" class="circuit circuit-flow-rev" stroke="#00f0ff" opacity="0.6"/>
  <line x1="445" y1="38" x2="445" y2="50" class="circuit circuit-flow" stroke="#f0e030" opacity="0.6"/>
  <line x1="690" y1="38" x2="690" y2="50" class="circuit circuit-flow-rev" stroke="#bf5fff" opacity="0.6"/>

  <!-- ============ CHIP MODULES ============ -->

  <!-- ====== CHIP 1: Python ====== centerX=95, translate(60, 50) -->
  <g class="chip" style="animation-delay:0.1s" transform="translate(60, 50)">
    <!-- Pins: top 2, bottom 2, left 1, right 1 -->
    <line x1="20" y1="0" x2="20" y2="-7" class="pin" stroke="#ff2d95"/>
    <line x1="50" y1="0" x2="50" y2="-7" class="pin" stroke="#ff2d95"/>
    <line x1="20" y1="40" x2="20" y2="47" class="pin" stroke="#ff2d95"/>
    <line x1="50" y1="40" x2="50" y2="47" class="pin" stroke="#ff2d95"/>
    <line x1="0" y1="20" x2="-7" y2="20" class="pin" stroke="#ff2d95"/>
    <line x1="70" y1="20" x2="77" y2="20" class="pin" stroke="#ff2d95"/>
    <!-- Outer glow rect -->
    <rect x="-2" y="-2" width="74" height="44" rx="4" fill="none" stroke="#ff2d95" stroke-width="1" opacity="0.15"/>
    <rect x="-3" y="-3" width="76" height="46" rx="5" fill="#ff2d95" opacity="0.04"/>
    <!-- Chip body -->
    <rect x="0" y="0" width="70" height="40" rx="3" class="chip-hex" stroke="#ff2d95" style="animation: pulse1 3s ease-in-out infinite;"/>
    <!-- Inner die -->
    <rect x="7" y="7" width="56" height="26" rx="1" fill="none" stroke="#ff2d95" stroke-width="0.5" opacity="0.3"/>
    <!-- Notch -->
    <circle cx="11" cy="11" r="2.5" fill="none" stroke="#ff2d95" stroke-width="0.5" opacity="0.5"/>
    <!-- Label glow layers -->
    <text x="36" y="23" class="chip-label" fill="#ff2d95" opacity="0.25">Python</text>
    <text x="34" y="21" class="chip-label" fill="#ff2d95" opacity="0.25">Python</text>
    <text x="35" y="22" class="chip-label" fill="#ff2d95" style="animation: flicker 5s infinite;">Python</text>
    <!-- Energy bar -->
    <rect x="0" y="44" width="70" height="4" class="energy-bar-bg"/>
    <rect x="1" y="45" height="2" fill="#ff4daa" class="energy-bar" style="animation: bar-fill-1 1.5s ease-out 0.3s both, bar-glow 2s ease-in-out 2s infinite;"/>
  </g>

  <!-- ====== CHIP 2: C++ ====== centerX=200, translate(165, 50) -->
  <g class="chip" style="animation-delay:0.2s" transform="translate(165, 50)">
    <line x1="20" y1="0" x2="20" y2="-7" class="pin" stroke="#00f0ff"/>
    <line x1="50" y1="0" x2="50" y2="-7" class="pin" stroke="#00f0ff"/>
    <line x1="20" y1="40" x2="20" y2="47" class="pin" stroke="#00f0ff"/>
    <line x1="50" y1="40" x2="50" y2="47" class="pin" stroke="#00f0ff"/>
    <line x1="0" y1="20" x2="-7" y2="20" class="pin" stroke="#00f0ff"/>
    <line x1="70" y1="20" x2="77" y2="20" class="pin" stroke="#00f0ff"/>
    <rect x="-2" y="-2" width="74" height="44" rx="4" fill="none" stroke="#00f0ff" stroke-width="1" opacity="0.15"/>
    <rect x="-3" y="-3" width="76" height="46" rx="5" fill="#00f0ff" opacity="0.04"/>
    <rect x="0" y="0" width="70" height="40" rx="3" class="chip-hex" stroke="#00f0ff" style="animation: pulse1 3.2s ease-in-out 0.3s infinite;"/>
    <rect x="7" y="7" width="56" height="26" rx="1" fill="none" stroke="#00f0ff" stroke-width="0.5" opacity="0.3"/>
    <circle cx="11" cy="11" r="2.5" fill="none" stroke="#00f0ff" stroke-width="0.5" opacity="0.5"/>
    <text x="36" y="23" class="chip-label" fill="#00f0ff" opacity="0.25">C++</text>
    <text x="34" y="21" class="chip-label" fill="#00f0ff" opacity="0.25">C++</text>
    <text x="35" y="22" class="chip-label" fill="#00f0ff" style="animation: flicker 4.5s 0.5s infinite;">C++</text>
    <rect x="0" y="44" width="70" height="4" class="energy-bar-bg"/>
    <rect x="1" y="45" height="2" fill="#33f5ff" class="energy-bar" style="animation: bar-fill-2 1.5s ease-out 0.5s both, bar-glow 2s ease-in-out 2s infinite;"/>
  </g>

  <!-- ====== CHIP 3: PyTorch ====== centerX=305, translate(270, 50) -->
  <g class="chip" style="animation-delay:0.3s" transform="translate(270, 50)">
    <line x1="20" y1="0" x2="20" y2="-7" class="pin" stroke="#39ff14"/>
    <line x1="50" y1="0" x2="50" y2="-7" class="pin" stroke="#39ff14"/>
    <line x1="20" y1="40" x2="20" y2="47" class="pin" stroke="#39ff14"/>
    <line x1="50" y1="40" x2="50" y2="47" class="pin" stroke="#39ff14"/>
    <line x1="0" y1="20" x2="-7" y2="20" class="pin" stroke="#39ff14"/>
    <line x1="70" y1="20" x2="77" y2="20" class="pin" stroke="#39ff14"/>
    <rect x="-2" y="-2" width="74" height="44" rx="4" fill="none" stroke="#39ff14" stroke-width="1" opacity="0.15"/>
    <rect x="-3" y="-3" width="76" height="46" rx="5" fill="#39ff14" opacity="0.04"/>
    <rect x="0" y="0" width="70" height="40" rx="3" class="chip-hex" stroke="#39ff14" style="animation: pulse1 2.8s ease-in-out 0.5s infinite;"/>
    <rect x="7" y="7" width="56" height="26" rx="1" fill="none" stroke="#39ff14" stroke-width="0.5" opacity="0.3"/>
    <circle cx="11" cy="11" r="2.5" fill="none" stroke="#39ff14" stroke-width="0.5" opacity="0.5"/>
    <text x="36" y="23" class="chip-label" fill="#39ff14" opacity="0.25">PyTorch</text>
    <text x="34" y="21" class="chip-label" fill="#39ff14" opacity="0.25">PyTorch</text>
    <text x="35" y="22" class="chip-label" fill="#39ff14" style="animation: flicker 5.2s 1s infinite;">PyTorch</text>
    <rect x="0" y="44" width="70" height="4" class="energy-bar-bg"/>
    <rect x="1" y="45" height="2" fill="#5fff40" class="energy-bar" style="animation: bar-fill-3 1.5s ease-out 0.7s both, bar-glow 2s ease-in-out 2s infinite;"/>
  </g>

  <!-- ====== CHIP 4: Linux ====== centerX=410, translate(375, 50) -->
  <g class="chip" style="animation-delay:0.4s" transform="translate(375, 50)">
    <line x1="20" y1="0" x2="20" y2="-7" class="pin" stroke="#f0e030"/>
    <line x1="50" y1="0" x2="50" y2="-7" class="pin" stroke="#f0e030"/>
    <line x1="20" y1="40" x2="20" y2="47" class="pin" stroke="#f0e030"/>
    <line x1="50" y1="40" x2="50" y2="47" class="pin" stroke="#f0e030"/>
    <line x1="0" y1="20" x2="-7" y2="20" class="pin" stroke="#f0e030"/>
    <line x1="70" y1="20" x2="77" y2="20" class="pin" stroke="#f0e030"/>
    <rect x="-2" y="-2" width="74" height="44" rx="4" fill="none" stroke="#f0e030" stroke-width="1" opacity="0.15"/>
    <rect x="-3" y="-3" width="76" height="46" rx="5" fill="#f0e030" opacity="0.04"/>
    <rect x="0" y="0" width="70" height="40" rx="3" class="chip-hex" stroke="#f0e030" style="animation: pulse1 3.5s ease-in-out 0.2s infinite;"/>
    <rect x="7" y="7" width="56" height="26" rx="1" fill="none" stroke="#f0e030" stroke-width="0.5" opacity="0.3"/>
    <circle cx="11" cy="11" r="2.5" fill="none" stroke="#f0e030" stroke-width="0.5" opacity="0.5"/>
    <text x="36" y="23" class="chip-label" fill="#f0e030" opacity="0.25">Linux</text>
    <text x="34" y="21" class="chip-label" fill="#f0e030" opacity="0.25">Linux</text>
    <text x="35" y="22" class="chip-label" fill="#f0e030" style="animation: flicker 4.8s 0.3s infinite;">Linux</text>
    <rect x="0" y="44" width="70" height="4" class="energy-bar-bg"/>
    <rect x="1" y="45" height="2" fill="#f5e84d" class="energy-bar" style="animation: bar-fill-4 1.5s ease-out 0.9s both, bar-glow 2s ease-in-out 2s infinite;"/>
  </g>

  <!-- ====== CHIP 5: OpenCV ====== centerX=515, translate(480, 50) -->
  <g class="chip" style="animation-delay:0.5s" transform="translate(480, 50)">
    <line x1="20" y1="0" x2="20" y2="-7" class="pin" stroke="#ff6a00"/>
    <line x1="50" y1="0" x2="50" y2="-7" class="pin" stroke="#ff6a00"/>
    <line x1="20" y1="40" x2="20" y2="47" class="pin" stroke="#ff6a00"/>
    <line x1="50" y1="40" x2="50" y2="47" class="pin" stroke="#ff6a00"/>
    <line x1="0" y1="20" x2="-7" y2="20" class="pin" stroke="#ff6a00"/>
    <line x1="70" y1="20" x2="77" y2="20" class="pin" stroke="#ff6a00"/>
    <rect x="-2" y="-2" width="74" height="44" rx="4" fill="none" stroke="#ff6a00" stroke-width="1" opacity="0.15"/>
    <rect x="-3" y="-3" width="76" height="46" rx="5" fill="#ff6a00" opacity="0.04"/>
    <rect x="0" y="0" width="70" height="40" rx="3" class="chip-hex" stroke="#ff6a00" style="animation: pulse1 3.1s ease-in-out 0.7s infinite;"/>
    <rect x="7" y="7" width="56" height="26" rx="1" fill="none" stroke="#ff6a00" stroke-width="0.5" opacity="0.3"/>
    <circle cx="11" cy="11" r="2.5" fill="none" stroke="#ff6a00" stroke-width="0.5" opacity="0.5"/>
    <text x="36" y="23" class="chip-label" fill="#ff6a00" opacity="0.25">OpenCV</text>
    <text x="34" y="21" class="chip-label" fill="#ff6a00" opacity="0.25">OpenCV</text>
    <text x="35" y="22" class="chip-label" fill="#ff6a00" style="animation: flicker 4.3s 0.8s infinite;">OpenCV</text>
    <rect x="0" y="44" width="70" height="4" class="energy-bar-bg"/>
    <rect x="1" y="45" height="2" fill="#ff8533" class="energy-bar" style="animation: bar-fill-5 1.5s ease-out 1.1s both, bar-glow 2s ease-in-out 2s infinite;"/>
  </g>

  <!-- ====== CHIP 6: TypeScript ====== centerX=620, translate(585, 50) -->
  <g class="chip" style="animation-delay:0.6s" transform="translate(585, 50)">
    <line x1="20" y1="0" x2="20" y2="-7" class="pin" stroke="#bf5fff"/>
    <line x1="50" y1="0" x2="50" y2="-7" class="pin" stroke="#bf5fff"/>
    <line x1="20" y1="40" x2="20" y2="47" class="pin" stroke="#bf5fff"/>
    <line x1="50" y1="40" x2="50" y2="47" class="pin" stroke="#bf5fff"/>
    <line x1="0" y1="20" x2="-7" y2="20" class="pin" stroke="#bf5fff"/>
    <line x1="70" y1="20" x2="77" y2="20" class="pin" stroke="#bf5fff"/>
    <rect x="-2" y="-2" width="74" height="44" rx="4" fill="none" stroke="#bf5fff" stroke-width="1" opacity="0.15"/>
    <rect x="-3" y="-3" width="76" height="46" rx="5" fill="#bf5fff" opacity="0.04"/>
    <rect x="0" y="0" width="70" height="40" rx="3" class="chip-hex" stroke="#bf5fff" style="animation: pulse1 2.9s ease-in-out 0.4s infinite;"/>
    <rect x="7" y="7" width="56" height="26" rx="1" fill="none" stroke="#bf5fff" stroke-width="0.5" opacity="0.3"/>
    <circle cx="11" cy="11" r="2.5" fill="none" stroke="#bf5fff" stroke-width="0.5" opacity="0.5"/>
    <text x="36" y="23" class="chip-label" fill="#bf5fff" opacity="0.25">TypeScript</text>
    <text x="34" y="21" class="chip-label" fill="#bf5fff" opacity="0.25">TypeScript</text>
    <text x="35" y="22" class="chip-label" fill="#bf5fff" style="animation: flicker 5.5s 1.2s infinite;">TypeScript</text>
    <rect x="0" y="44" width="70" height="4" class="energy-bar-bg"/>
    <rect x="1" y="45" height="2" fill="#d080ff" class="energy-bar" style="animation: bar-fill-6 1.5s ease-out 1.3s both, bar-glow 2s ease-in-out 2s infinite;"/>
  </g>

  <!-- ====== CHIP 7: Docker ====== centerX=725, translate(690, 50) -->
  <g class="chip" style="animation-delay:0.7s" transform="translate(690, 50)">
    <line x1="20" y1="0" x2="20" y2="-7" class="pin" stroke="#2d7fff"/>
    <line x1="50" y1="0" x2="50" y2="-7" class="pin" stroke="#2d7fff"/>
    <line x1="20" y1="40" x2="20" y2="47" class="pin" stroke="#2d7fff"/>
    <line x1="50" y1="40" x2="50" y2="47" class="pin" stroke="#2d7fff"/>
    <line x1="0" y1="20" x2="-7" y2="20" class="pin" stroke="#2d7fff"/>
    <line x1="70" y1="20" x2="77" y2="20" class="pin" stroke="#2d7fff"/>
    <rect x="-2" y="-2" width="74" height="44" rx="4" fill="none" stroke="#2d7fff" stroke-width="1" opacity="0.15"/>
    <rect x="-3" y="-3" width="76" height="46" rx="5" fill="#2d7fff" opacity="0.04"/>
    <rect x="0" y="0" width="70" height="40" rx="3" class="chip-hex" stroke="#2d7fff" style="animation: pulse1 3.3s ease-in-out 0.6s infinite;"/>
    <rect x="7" y="7" width="56" height="26" rx="1" fill="none" stroke="#2d7fff" stroke-width="0.5" opacity="0.3"/>
    <circle cx="11" cy="11" r="2.5" fill="none" stroke="#2d7fff" stroke-width="0.5" opacity="0.5"/>
    <text x="36" y="23" class="chip-label" fill="#2d7fff" opacity="0.25">Docker</text>
    <text x="34" y="21" class="chip-label" fill="#2d7fff" opacity="0.25">Docker</text>
    <text x="35" y="22" class="chip-label" fill="#2d7fff" style="animation: flicker 4.7s 0.6s infinite;">Docker</text>
    <rect x="0" y="44" width="70" height="4" class="energy-bar-bg"/>
    <rect x="1" y="45" height="2" fill="#5599ff" class="energy-bar" style="animation: bar-fill-7 1.5s ease-out 1.5s both, bar-glow 2s ease-in-out 2s infinite;"/>
  </g>

  <!-- ============ BOTTOM DECORATIONS ============ -->
  <rect x="30" y="170" width="790" height="1" fill="#00f0ff" opacity="0.08"/>

  <!-- Bottom status bar -->
  <text x="30" y="185" class="ver" style="fill:#1a4050;">SYS.modules_loaded: 7 | status: OPERATIONAL | uptime: 99.97%</text>
  <text x="680" y="185" class="ver" style="fill:#ff2d95; opacity:0.4; animation: flicker 3s infinite;">&#9679; LIVE</text>

  <!-- Decorative bottom circuit nodes -->
  <circle cx="30" cy="192" r="2" fill="#00f0ff" opacity="0.2" style="animation: pulse2 3s infinite;"/>
  <line x1="32" y1="192" x2="80" y2="192" stroke="#00f0ff" stroke-width="0.5" opacity="0.15"/>
  <circle cx="80" cy="192" r="1.5" fill="#39ff14" opacity="0.2" style="animation: pulse2 3s 0.5s infinite;"/>
  <line x1="82" y1="192" x2="130" y2="192" stroke="#39ff14" stroke-width="0.5" opacity="0.1"/>
  <circle cx="130" cy="192" r="1.5" fill="#ff2d95" opacity="0.2" style="animation: pulse2 3s 1s infinite;"/>
</svg>